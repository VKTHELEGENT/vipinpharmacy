<!DOCTYPE html>
<html lang="en" data-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediFlow - Edit Medicine</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
</head>
<body>

    <!-- Header Navigation -->
    <header class="header-nav">
        <div class="container header-container">
            <a href="/faculty/dashboard" class="brand-section">
                <div class="brand-logo">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 10.5h-5.5V5c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v5.5H5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5h5.5V19c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5v-5.5H19c.83 0 1.5-.67 1.5-1.5s-.67-1.5-1.5-1.5z" />
                    </svg>
                </div>
                <span class="brand-name">MediFlow Pharmacy</span>
            </a>

            <div class="nav-actions">
                <div class="user-menu" id="header-user-menu">
                    <div class="user-avatar" th:text="${#strings.substring(username, 0, 1).toUpperCase()}">U</div>
                    <span class="user-name" th:text="${username + ' (staff)'}">Username</span>
                    <form action="/logout" method="POST" style="margin: 0; display: inline;">
                        <button type="submit" class="btn btn-secondary btn-small" style="border: none; padding: 0.25rem 0.5rem; cursor: pointer;">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </header>

    <main style="flex:1; padding-top: 2rem;">
        <section class="auth-wrapper app-screen-view visible fade-in-anim">
            <div class="auth-container" style="max-width: 600px;">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2>Edit Medicine Stock</h2>
                        <p th:text="${'Modify details for ' + medicine.name}">Edit stock details</p>
                    </div>

                    <form th:action="@{/faculty/medicines/edit/{id}(id=${medicine.id})}" method="POST">
                        <div class="form-group">
                            <label for="edit-med-name">Medicine Product Name</label>
                            <input type="text" id="edit-med-name" name="name" class="form-input" th:value="${medicine.name}" required>
                        </div>

                        <div class="form-group">
                            <label for="edit-med-details">Prescription Dosage, Composition, Instructions</label>
                            <textarea id="edit-med-details" name="details" class="form-input" rows="6" th:text="${medicine.details}" required></textarea>
                        </div>

                        <div style="display:flex; justify-content:flex-end; gap: 1rem; margin-top: 2rem;">
                            <a href="/faculty/dashboard" class="btn btn-secondary" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER PANEL -->
    <footer>
        <div class="container">
            <p>&copy; 2026 MediFlow Pharmacy Manager. Powered by Java & MySQL Relational DB.</p>
        </div>
    </footer>
</body>
</html>
