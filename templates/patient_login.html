{% extends "base.html" %}

{% block title %}Patient Login - Medical Pharmacy Manager{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h2>Patient Access</h2>
        <form method="POST" action="{{ url_for('patient_login') }}">
            <div class="form-group" style="text-align: center; margin-bottom: 20px;">
                <label style="display: inline-block; margin-right: 20px; cursor: pointer;">
                    <input type="radio" name="mode" value="login" checked> Login
                </label>
                <label style="display: inline-block; cursor: pointer;">
                    <input type="radio" name="mode" value="register"> Register
                </label>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
        </form>

        <div class="login-footer">
            <div class="login-links">
                <a href="{{ url_for('faculty_login') }}">Faculty Login</a> |
                <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
