{% extends "base.html" %}

{% block title %}Forgot Password - Medical Pharmacy Manager{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h2>Forgot Password</h2>
        <p class="info-text">Enter your email address and user type to receive a verification code.</p>
        <form method="POST" action="{{ url_for('forgot_password') }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required autofocus>
            </div>
            <div class="form-group">
                <label for="user_type">User Type</label>
                <select id="user_type" name="user_type" required>
                    <option value="patient">Patient</option>
                    <option value="faculty">Faculty</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Send Verification Code</button>
        </form>
        <div class="login-footer">
            <a href="{{ url_for('patient_login') }}">Back to Patient Login</a>
        </div>
    </div>
</div>
{% endblock %}
