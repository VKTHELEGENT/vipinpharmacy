{% extends "base.html" %}

{% block title %}Reset Password - Medical Pharmacy Manager{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h2>Reset Password</h2>
        <p class="info-text">Enter the verification code sent to your email and your new password.</p>
        <form method="POST" action="{{ url_for('reset_password') }}">
            <input type="hidden" name="email" value="{{ email }}">
            <div class="form-group">
                <label for="email-display">Email</label>
                <input type="email" id="email-display" value="{{ email }}" disabled>
            </div>
            <div class="form-group">
                <label for="code">Verification Code</label>
                <input type="text" id="code" name="code" required autofocus placeholder="Enter 6-digit code">
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-primary">Reset Password</button>
        </form>
        <div class="login-footer">
            <a href="{{ url_for('forgot_password') }}">Request New Code</a>
        </div>
    </div>
</div>
{% endblock %}
